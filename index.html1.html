<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Policial WSP OFFLINE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:'Segoe UI';background:#0b1e2d;color:white;margin:0}
header{background:#000;padding:15px;text-align:center;font-size:22px;border-bottom:2px solid #1e88e5}
.container{width:95%;margin:auto}
.card{background:#0e2435;padding:15px;border-radius:10px;margin-top:15px}
input,select,textarea{width:100%;margin:5px 0;padding:8px;border-radius:5px;border:none;background:#081521;color:white}
button{padding:8px;background:#1e88e5;color:white;border:none;border-radius:5px;cursor:pointer}
ul{list-style:none;padding:0}
li{background:#020c14;margin:5px 0;padding:10px;border-radius:5px;border-left:4px solid #1e88e5}
.hidden{display:none}
</style>
</head>
<body>

<header>🚓 SISTEMA POLICIAL WSP (OFFLINE)</header>

<div id="loginPanel" class="card" style="max-width:300px;margin:80px auto">
<h3>🔐 Acceso</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>

<div id="app" class="container hidden">
<button onclick="logout()">Cerrar sesión</button>

<div class="card">
<h3>👮 Oficiales</h3>
<input id="nombreOficial" placeholder="Nombre">
<select id="rango">
<option>Agente</option>
<option>Sargento</option>
<option>Capitán</option>
</select>
<button onclick="agregarOficial()">Agregar</button>
<ul id="listaOficiales"></ul>
</div>

<div class="card">
<h3>📄 Reporte</h3>
<select id="tipo">
<option>Crimen</option>
<option>Accidente</option>
<option>Robo</option>
</select>
<select id="oficial"></select>
<input id="ubicacion" placeholder="Ubicación">
<textarea id="descripcion" placeholder="Descripción"></textarea>
<button onclick="crearReporte()">Guardar</button>
<button onclick="window.print()">🖨️ Imprimir</button>

<h3>📋 Reportes</h3>
<ul id="listaReportes"></ul>
</div>
</div>

<script>
// 🔐 LOGIN LOCAL
function login(){
  if(user.value === 'admin' && pass.value === '1234'){
    loginPanel.classList.add('hidden');
    app.classList.remove('hidden');
  } else {
    alert('Credenciales incorrectas');
  }
}

function logout(){
  loginPanel.classList.remove('hidden');
  app.classList.add('hidden');
}

// 📦 DATOS EN MEMORIA
let oficiales = [];
let reportes = [];

function agregarOficial(){
  let nombre = nombreOficial.value;
  let r = rango.value;
  if(!nombre) return;

  oficiales.push({nombre, rango:r});
  renderOficiales();
}

function renderOficiales(){
  listaOficiales.innerHTML='';
  oficial.innerHTML='<option>Seleccionar</option>';

  oficiales.forEach(o=>{
    listaOficiales.innerHTML+=`<li>${o.rango} ${o.nombre}</li>`;
    oficial.innerHTML+=`<option>${o.nombre}</option>`;
  });
}

function crearReporte(){
  let r={
    tipo:tipo.value,
    oficial:oficial.value,
    ubicacion:ubicacion.value,
    descripcion:descripcion.value,
    fecha:new Date().toLocaleString()
  };

  reportes.push(r);
  renderReportes();
}

function renderReportes(){
  listaReportes.innerHTML='';
  reportes.forEach(r=>{
    listaReportes.innerHTML+=`<li><strong>${r.tipo}</strong> - ${r.oficial}<br>📍 ${r.ubicacion}<br>${r.descripcion}<br><small>${r.fecha}</small></li>`;
  });
}
</script>

</body>
</html>
